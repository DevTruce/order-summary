<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="stylesheet" href="src/styles.css" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Order summary card</title>
  </head>
  <body>
    <main class="card-container">
      <picture class="image-container">
        <img
          class="image"
          src="src/images/illustration-hero.svg"
          alt="person dancing"
        />
      </picture>

      <section class="order-body">
        <article class="order-container">
          <h1 class="order-header">Order Summary</h1>
          <p class="order-text">
            You can now listen to millions of songs, audiobooks, and podcasts on
            any device anywhere you like!
          </p>
        </article>

        <section class="pricing-container">
          <img class="music-icon" src="src/images/icon-music.svg" alt="" />
          <span class="plan-text"
            >Annual Plan <span class="plan-cost">$59.99/year</span></span
          >
          <a href="#change-plan" class="change-plan">Change</a>
        </section>

        <footer class="card-footer">
          <a class="payment" href="#proceed-to-payment">Proceed to Payment</a>
          <a class="cancel-order" href="#cancel-order">Cancel Order</a>
        </footer>
      </section>
    </main>

    <footer class="page-footer">
      <p>
        Challenge by
        <a
          class="links"
          href="https://www.frontendmentor.io/home"
          target="_blank"
          >Frontend Mentor</a
        >
      </p>
      <p>
        Coded by
        <a class="links" href="https://github.com/DevTruce" target="_blank"
          >Truce R</a
        >
      </p>
    </footer>
  </body>
</html>
