<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <!-- LINKS -->
    <link rel="stylesheet" href="styles.css" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Red+Hat+Display:ital,wght@0,500;0,900;1,700&display=swap"
      rel="stylesheet"
    />
    <!-- LINKS -->

    <title>Frontend Mentor | Order summary card</title>
  </head>
  <body>
    <main class="card-container">
      <img
        class="card-image"
        src="images/illustration-hero.svg"
        alt="person dancing"
      />
      <h1 class="card-header">Order Summary</h1>
      <p class="card-text">
        You can now listen to millions of songs, audiobooks, and podcasts on any
        device anywhere you like!
      </p>
      <section class="pricing-panel">
        <img class="music-icon" src="images/icon-music.svg" alt="music icon" />
        <span>Annual Plan <br /><span>$59.99/year</span></span>

        <a href="#">Change</a>
      </section>
      <button>Proceed to Payment</button>
      <a href="#" class="cancel-order">Cancel Order</a>
    </main>
    <footer class="footer-text">
      <p>
        Frontend Mentor Challenge | Coded by:
        <a href="https://github.com/DevTruce" target="_blank">Truce R</a>
      </p>
    </footer>
  </body>
</html>
